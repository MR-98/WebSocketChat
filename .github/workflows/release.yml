name: Release - Test, Build & Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run tests
        run: mvn clean verify
        working-directory: backend

  terraform-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Terraform fmt check
        run: terraform fmt -check
        working-directory: ./infrastructure

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: ./infrastructure

      - name: Terraform validate
        run: terraform validate
        working-directory: ./infrastructure

  build-and-push:
    needs: [terraform-check, backend-tests]
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: vars
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase OWNER
        id: owner
        run: echo "owner=$(echo $GITHUB_REPOSITORY_OWNER | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # BACKEND
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/websocket-chat-backend:${{ steps.vars.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.owner }}/websocket-chat-backend:latest

      # FRONTEND
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.owner }}/websocket-chat-frontend:${{ steps.vars.outputs.version }}
            ghcr.io/${{ steps.owner.outputs.owner }}/websocket-chat-frontend:latest

      


  release:
    needs: build-and-push
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # CHANGELOG
      - name: Generate changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            git log --pretty=format:"- %s" > CHANGELOG.txt
          else
            git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s" > CHANGELOG.txt
          fi

      # RELEASE
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}